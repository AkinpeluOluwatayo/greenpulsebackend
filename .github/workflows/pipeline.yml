name: Backend CI Pipeline

on:
  push:
    branches: [ main, develop ] # Runs on main and development branches
  pull_request:
    branches: [ main ]

jobs:
  continuous-integration:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci # 'npm ci' is faster and more reliable for pipelines than 'npm install'

      - name: Security Audit
        run: npm audit --audit-level=high # Checks for known vulnerabilities in your packages

      - name: Run Backend Tests
        run: npm test